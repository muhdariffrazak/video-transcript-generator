services:
  transcript-generator-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: video-transcript-generator-dev
    stdin_open: true
    tty: true
    pull_policy: always
    runtime: nvidia                    # Enables GPU
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ID0:-0}  # SLURM: uses ID0, Normal PC: defaults to 0
    volumes:
      - ./videos:/videos:ro             # Put your videos here
      - ./output:/output                # Transcripts will be saved here
      - ./configs:/app/configs:ro
      - model_cache:/app/cache/huggingface  # Persistent: shared model cache
      - temp_data:/app/temp             # Persistent: temporary processing files
      - ./src:/app/src                  # Live code updates in dev
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  model_cache:    # Named volume: persists across runs on both normal PCs and SLURM
  temp_data:      # Named volume: persists across runs on both normal PCs and SLURM
